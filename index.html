<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FAST Bulk ZIP → PDF</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  background:#0f0f0f;
  color:white;
  font-family:Arial;
  text-align:center;
  padding:20px;
}
.box{
  background:#1c1c1c;
  padding:20px;
  border-radius:12px;
  max-width:420px;
  margin:auto;
}
button{
  padding:12px 20px;
  background:#00c853;
  border:none;
  color:white;
  font-size:16px;
  border-radius:8px;
  margin-top:15px;
}
</style>
</head>

<body>

<div class="box">
<h2>⚡ FAST Bulk ZIP → PDF</h2>

<input type="file" id="files" multiple accept=".zip"><br>
<button onclick="start()">Start Fast Convert</button>

<p id="status"></p>
</div>

<script>
const { jsPDF } = window.jspdf;

async function start(){

  const files = document.getElementById("files").files;
  const status = document.getElementById("status");

  if(!files.length){
    alert("ZIP select karo");
    return;
  }

  for(let f=0; f<files.length; f++){
    status.innerText=`Processing ${files[f].name}`;
    await fastConvert(files[f], status);
  }

  status.innerText="✅ All Done!";
}

async function fastConvert(file,status){

  const zip = await JSZip.loadAsync(file);

  let images=[];

  zip.forEach((path,entry)=>{
    if(!entry.dir && /\.(jpg|jpeg|png|webp)$/i.test(path)){
      images.push(entry);
    }
  });

  images.sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true}));

  const pdf = new jsPDF({
    compress:true
  });

  for(let i=0;i<images.length;i++){

    status.innerText=`${file.name} → ${i+1}/${images.length}`;

    const uint8 = await images[i].async("uint8array");

    const blob = new Blob([uint8]);
    const url = URL.createObjectURL(blob);

    const img = await createImageBitmap(blob); // FAST decoding

    const pageW = pdf.internal.pageSize.getWidth();
    const pageH = img.height * pageW / img.width;

    if(i>0) pdf.addPage();

    pdf.addImage(url,"JPEG",0,0,pageW,pageH,undefined,"FAST");

    URL.revokeObjectURL(url);
  }

  pdf.save(file.name.replace(".zip",".pdf"));
}
</script>

</body>
</html>o
