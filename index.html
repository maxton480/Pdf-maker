<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Batch ZIP → PDF</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
 background:#111;
 color:white;
 font-family:Arial;
 text-align:center;
 padding:20px;
}
.box{
 background:#1e1e1e;
 padding:20px;
 border-radius:12px;
 max-width:420px;
 margin:auto;
}
button{
 padding:12px 18px;
 background:#00c853;
 border:none;
 color:white;
 font-size:16px;
 border-radius:8px;
 margin-top:15px;
}
.progress{
 margin-top:15px;
}
</style>
</head>

<body>

<div class="box">
<h2>🚀 Batch ZIP → PDF (50+ Supported)</h2>

<input type="file" id="files" multiple accept=".zip"><br>
<button onclick="startBatch()">Start Batch Convert</button>

<div class="progress" id="status"></div>
</div>

<script>

const { jsPDF } = window.jspdf;

async function startBatch(){

 const files = document.getElementById("files").files;
 const status = document.getElementById("status");

 if(!files.length){
   alert("ZIP select karo");
   return;
 }

 for(let i=0;i<files.length;i++){

   await convert(files[i], i+1, files.length, status);

   // MEMORY COOL DOWN (important for phone)
   await new Promise(r=>setTimeout(r,800));
 }

 status.innerText="✅ ALL DONE!";
}

async function convert(file,index,total,status){

 status.innerText=`(${index}/${total}) Opening ${file.name}`;

 const zip = await JSZip.loadAsync(file);

 let images=[];

 zip.forEach((path,entry)=>{
   if(!entry.dir && /\.(jpg|jpeg|webp|png)$/i.test(path)){
     images.push(entry);
   }
 });

 images.sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true}));

 const pdf = new jsPDF({compress:true});

 for(let i=0;i<images.length;i++){

   status.innerText=`${file.name} → ${i+1}/${images.length}`;

   const blob = await images[i].async("blob");

   const img = await createImageBitmap(blob);

   const w = pdf.internal.pageSize.getWidth();
   const h = img.height * w / img.width;

   if(i>0) pdf.addPage();

   pdf.addImage(img,"JPEG",0,0,w,h,undefined,"FAST");

   img.close(); // MEMORY FREE
 }

 pdf.save(file.name.replace(".zip",".pdf"));

 // FORCE MEMORY CLEAN
 images=null;
 zip=null;
}

</script>

</body>
</html>
